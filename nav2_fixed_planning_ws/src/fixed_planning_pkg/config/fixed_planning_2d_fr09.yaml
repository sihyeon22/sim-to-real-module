global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True # 실차 전환 시 False로 수정
      footprint: "[ [0.79, 0.37], [0.79, -0.37], [-0.79, -0.37], [-0.79, 0.37] ]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 1.5
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    use_sim_time: True # 실차 전환 시 False로 수정
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      allow_unknown: true
      downsample_costmap: true
      downsampling_factor: 2
      max_iterations: 3000000
      max_on_approach_iterations: 5000
      max_planning_time: 10.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 144
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 5.0
      minimum_turning_radius: 1.71
      change_penalty: 0.0
      non_straight_penalty: 1.5
      cost_penalty: 5.0
      retrospective_penalty: 0.1
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true
