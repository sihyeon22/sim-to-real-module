# File: map.yaml
# Description: Map server parameters

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""    # overridden at launch time via map_yaml arg

map_saver:
  ros__parameters:
    use_sim_time: True
    map_subscribe_transient_local: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65