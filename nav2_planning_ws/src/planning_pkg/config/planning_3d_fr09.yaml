bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 0.5
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      footprint: "[[1.220, 0.3715], [1.220, -0.3715], [-0.369, -0.3715], [-0.369, 0.3715]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      obstacle_layer:
        min_obstacle_height: 0.1
        max_obstacle_height: 2.5

        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: lidar3d
        lidar3d:
          topic: /carla/hero/lidar_filtered

          min_obstacle_height: 0.1
          max_obstacle_height: 2.5

          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_min_range: 0.0
          obstacle_max_range: 15.0
          raytrace_min_range: 0.0
          raytrace_max_range: 15.0

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 1.0
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      allow_unknown: true
      downsample_costmap: true
      downsampling_factor: 2
      max_iterations: 3000000
      max_on_approach_iterations: 5000
      max_planning_time: 10.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 144
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 5.0
      minimum_turning_radius: 1.1
      reverse_penalty: 2.1
      change_penalty: 0.0
      non_straight_penalty: 1.5
      cost_penalty: 5.0
      retrospective_penalty: 0.1
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

robot_state_publisher:
  ros__parameters:
    use_sim_time: True
    
waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200
