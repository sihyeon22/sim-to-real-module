global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True # 실차 전환 시 False로 수정
      footprint: "[ [0.79, 0.37], [0.79, -0.37], [-0.79, -0.37], [-0.79, 0.37] ]"     # 차량 제원에 맞게 설정
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 1.5
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    use_sim_time: True # 실차 전환 시 False로 수정
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"       # 사용 알고리즘: Smac Hybrid A*
      tolerance: 0.5                                      # 목표 지점 도달 허용 오차. xy_goal_tolerance와 일치해야 함.
      allow_unknown: true
      downsample_costmap: true
      downsampling_factor: 2
      max_iterations: 3000000
      max_on_approach_iterations: 5000
      max_planning_time: 10.0                             # 경로 계산 최대 시간
      motion_model_for_search: "DUBIN"                    # 전진만 하는 경로 모델. 후진 필요 시 REEDS_SHEPP로 변경
      angle_quantization_bins: 144                        # 방향 각도를 144개로 나눔(2.5도 간격). 높을수록 정밀하지만 느림.
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 5.0
      minimum_turning_radius: 1.71                        # 최소 회전 반경, 차량에 맞게 설정
      change_penalty: 0.0
      non_straight_penalty: 1.5                           # 값이 클수록 직진 경로 선호
      cost_penalty: 5.0                                   # 클수록 장애물에서 멀리 돌아감
      retrospective_penalty: 0.1
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true

smoother_server:
  ros__parameters:
    use_sim_time: True # 실차 전환 시 False로 수정
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True # 실차 전환 시 False로 수정
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200