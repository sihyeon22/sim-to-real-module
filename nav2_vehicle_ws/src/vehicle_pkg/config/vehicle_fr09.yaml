# File: vehicle_fr09.yaml
# Description: Vehicle interface parameters for FR-09 (CARLA simulation)

# cmd_vel (linear + angular) → AckermannDriveStamped
cmd_vel_to_ackermann:
  ros__parameters:
    input_topic: /cmd_vel
    output_topic: /carla/hero/ackermann_cmd
    wheelbase: 0.856               # 축간 거리 (m)
    max_steering_angle: 0.463      # 최대 조향각 (rad)
    angular_deadband: 0.06         # 이 이하의 angular_vel은 직진으로 처리
    min_speed_for_steer: 0.15      # 조향 적용 최소 속도 (m/s)
    max_speed: 0.6                 # 최대 속도 (m/s)
    acceleration: 0.0              # AckermannDriveStamped acceleration 필드
    jerk: 0.0                      # AckermannDriveStamped jerk 필드
