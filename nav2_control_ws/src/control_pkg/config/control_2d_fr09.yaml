# File: control_2d_fr09.yaml
# Description: Control module parameters for FR-09

controller_server:
  ros__parameters:
    use_sim_time: True # 실차 전환 시 False로 수정
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # 15초동안 0.2m 이동하지 못하면 Recovery 수행
      required_movement_radius: 0.2
      movement_time_allowance: 20.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # 목적지 허용 오차(0.5m, 2.0rad 이내면 성공)
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 2.0
      stateful: True
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      allow_reversing: false
      use_dynamic_window: false
      use_velocity_scaled_lookahead_dist: false
      use_rotate_to_heading: false           
      use_collision_detection: true
      use_regulated_linear_velocity_scaling: true               
      use_cost_regulated_linear_velocity_scaling: true

      desired_linear_vel: 0.5
      min_approach_linear_velocity: 0.05
      lookahead_dist: 1.5
      # min_lookahead_dist: 1.0                                   
      # max_lookahead_dist: 2.0
      # lookahead_time: 2.0                                       
      cost_scaling_dist: 1.0
      cost_scaling_gain: 2.0
      approach_velocity_scaling_dist: 2.0
      regulated_linear_scaling_min_radius: 1.71
      regulated_linear_scaling_min_speed: 0.3
      max_allowed_time_to_collision_up_to_carrot: 2.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True # 실차 전환 시 False로 수정
      rolling_window: true
      # local_costmap 크기, 차량 제원에 맞게 설정
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[ [0.79, 0.37], [0.79, -0.37], [-0.79, -0.37], [-0.79, 0.37] ]"
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.7
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0
      always_send_full_costmap: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["backup", "drive_on_heading", "wait"]
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 1.0
    use_sim_time: true                  # 실차 전환 시 False로 수정
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

velocity_smoother:
  ros__parameters:
    use_sim_time: True                  # 실차 전환 시 False로 수정
    smoothing_frequency: 10.0
    scale_velocities: False
    feedback: "OPEN_LOOP"               # OPEN_LOOP=시간 기반, CLOSED_LOOP=odom 피드백. 불안정한 odom에서는 OPEN_LOOP 권장 
    max_velocity: [0.5, 0.0, 0.5]       # desired_linear_vel과 맞추기
    max_accel: [0.3, 0.0, 0.3]
    max_decel: [-1.5, 0.0, -1.0]
    odom_topic: "/odom"                 # 사용하는 odometry 토픽
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0